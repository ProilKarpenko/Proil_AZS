<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Карта доступности АЗС Proil</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #e9edf4;
      -webkit-tap-highlight-color: transparent;
    }
    #map-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #map {
      width: 100%;
      height: 100%;
    }

    .legend-toggle-btn {
      position: absolute;
      bottom: 30px;
      right: 30px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(31, 42, 65, 0.9);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
      font-size: 22px;
      font-weight: 600;
      font-style: italic;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .legend-toggle-btn:active {
      transform: scale(0.92);
    }
    .legend-toggle-btn.active {
      background: rgba(192, 57, 43, 0.9);
    }

    .desktop-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
      min-width: 140px;
    }
    .desktop-controls .city-buttons {
      display: flex;
      gap: 8px;
    }
    .desktop-controls .city-buttons .city-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 8px 8px;
      font-size: 13px;
      font-weight: 500;
      color: #1f2a41;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      min-width: 0;
    }
    .desktop-controls .city-buttons .city-btn:hover {
      background: rgba(255, 255, 255, 1);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }
    .desktop-controls .city-buttons .city-btn:active {
      transform: scale(0.95);
    }

    .desktop-filter-dropdown {
      position: relative;
      display: block;
      width: 100%;
    }
    .desktop-filter-dropdown .filter-dropdown-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #1f2a41;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: space-between;
    }
    .desktop-filter-dropdown .filter-dropdown-btn:hover {
      background: rgba(255, 255, 255, 1);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }
    .desktop-filter-dropdown .filter-dropdown-btn .arrow {
      font-size: 10px;
      transition: transform 0.2s ease;
    }
    .desktop-filter-dropdown .filter-dropdown-btn.active .arrow {
      transform: rotate(180deg);
    }
    .desktop-filter-dropdown .filter-dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      left: 0;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 6px 0;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 20;
    }
    .desktop-filter-dropdown .filter-dropdown-menu.open {
      display: block;
    }
    .desktop-filter-dropdown .filter-dropdown-menu .filter-option {
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      color: #1f2a41;
      transition: background 0.15s ease;
      white-space: nowrap;
      text-align: center;
    }
    .desktop-filter-dropdown .filter-dropdown-menu .filter-option:hover {
      background: rgba(0, 0, 0, 0.05);
    }
    .desktop-filter-dropdown .filter-dropdown-menu .filter-option.active-filter {
      background: rgba(31, 42, 65, 0.1);
      font-weight: 600;
    }

    .mobile-glass-panel {
      display: none;
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      padding: 10px 18px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      z-index: 10;
      display: none;
      gap: 8px;
      min-width: 320px;
      max-width: 95%;
      width: auto;
    }
    .mobile-glass-panel .glass-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: #1f2a41;
      font-size: 28px;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      flex: 1;
      text-align: center;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      min-width: 48px;
    }
    .mobile-glass-panel .glass-btn:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.3);
    }
    .mobile-glass-panel .glass-btn.active {
      background: rgba(31, 42, 65, 0.7);
      color: white;
    }
    .mobile-glass-panel .glass-btn .icon-img {
      width: 28px;
      height: 28px;
      display: block;
      filter: brightness(0) saturate(100%) invert(15%) sepia(20%) saturate(500%) hue-rotate(200deg) brightness(95%) contrast(90%);
    }
    .mobile-glass-panel .glass-btn.active .icon-img {
      filter: brightness(0) saturate(100%) invert(100%) sepia(0%) saturate(0%) brightness(100%) contrast(100%);
    }
    .mobile-glass-panel .glass-btn .icon-img-location {
      width: 28px;
      height: 28px;
      display: block;
      filter: brightness(0) saturate(100%) invert(15%) sepia(20%) saturate(500%) hue-rotate(200deg) brightness(95%) contrast(90%);
    }
    .mobile-glass-panel .glass-btn.active .icon-img-location {
      filter: brightness(0) saturate(100%) invert(100%) sepia(0%) saturate(0%) brightness(100%) contrast(100%);
    }

    .city-select-menu {
      display: none;
      position: absolute;
      bottom: 190px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      z-index: 15;
      min-width: 180px;
      max-width: 90%;
      opacity: 0;
      transform: translateX(-50%) translateY(10px) scale(0.95);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .city-select-menu.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      pointer-events: auto;
    }
    .city-select-menu-title {
      font-weight: 600;
      font-size: 0.9rem;
      color: #0b1b33;
      margin-bottom: 0.5rem;
      text-align: center;
      border-bottom: 1px solid #eef2f6;
      padding-bottom: 0.4rem;
    }
    .city-select-menu .city-option {
      display: flex;
      align-items: center;
      padding: 0.5rem 0.8rem;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.15s ease;
      font-size: 0.95rem;
      color: #1f2a41;
      justify-content: center;
    }
    .city-select-menu .city-option:active {
      background: rgba(0, 0, 0, 0.08);
    }

    .filter-select-menu {
      display: none;
      position: absolute;
      bottom: 190px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      z-index: 15;
      min-width: 200px;
      max-width: 90%;
      opacity: 0;
      transform: translateX(-50%) translateY(10px) scale(0.95);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .filter-select-menu.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      pointer-events: auto;
    }
    .filter-select-menu-title {
      font-weight: 600;
      font-size: 0.9rem;
      color: #0b1b33;
      margin-bottom: 0.5rem;
      text-align: center;
      border-bottom: 1px solid #eef2f6;
      padding-bottom: 0.4rem;
    }
    .filter-select-menu .filter-option {
      display: flex;
      align-items: center;
      padding: 0.5rem 0.8rem;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.15s ease;
      font-size: 0.95rem;
      color: #1f2a41;
      justify-content: center;
    }
    .filter-select-menu .filter-option:active {
      background: rgba(0, 0, 0, 0.08);
    }
    .filter-select-menu .filter-option.active-filter {
      background: rgba(31, 42, 65, 0.1);
      font-weight: 600;
    }

    .legend-popup {
      position: absolute;
      bottom: 30px;
      right: 100px;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 1.2rem 1.6rem 1.4rem;
      min-width: 200px;
      max-width: 280px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 10;
      opacity: 0;
      transform: translateY(12px) scale(0.95);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      font-size: 0.95rem;
      color: #1f2a41;
    }
    .legend-popup.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .legend-popup-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.7rem;
      border-bottom: 2px solid #eef2f6;
      padding-bottom: 0.4rem;
      letter-spacing: 0.3px;
      color: #0b1b33;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.4rem 0;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s ease;
      user-select: none;
    }
    .legend-item:hover {
      background: rgba(0, 0, 0, 0.05);
    }
    .legend-item.hidden {
      opacity: 0.4;
    }
    .legend-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
      transition: all 0.15s ease;
    }
    .legend-label {
      font-weight: 400;
      color: #2f405b;
      font-size: 0.9rem;
      transition: all 0.15s ease;
    }

    .maplibregl-popup-content {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 0.8rem 1rem 0.7rem;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      background: #ffffff;
      max-width: 320px;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }
    .maplibregl-popup-content .popup-desc {
      font-weight: 600;
      font-size: 1rem;
      color: #000000;
      margin-bottom: 0.1rem;
    }
    .maplibregl-popup-content .popup-label {
      font-weight: 400;
      color: #000000;
      font-size: 0.9rem;
      opacity: 0.85;
    }
    .maplibregl-popup-content .popup-datetime {
      font-size: 0.8rem;
      color: #000000;
      margin-top: 0.2rem;
      opacity: 0.7;
    }
    .maplibregl-popup-content .popup-coords {
      font-size: 0.8rem;
      color: #000000;
      margin-top: 0.2rem;
      opacity: 0.7;
      cursor: pointer;
      transition: opacity 0.15s ease;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .maplibregl-popup-content .popup-coords:hover {
      opacity: 1;
    }
    .maplibregl-popup-content .popup-coords .copy-icon {
      font-size: 0.8rem;
      opacity: 0.5;
    }
    .maplibregl-popup-content .popup-coords.copied .copy-icon {
      opacity: 1;
      color: #2ecc71;
    }
    .maplibregl-popup-close-button {
      font-size: 1.2rem;
      color: #000000;
      opacity: 0.5;
    }
    .maplibregl-popup-close-button:hover {
      opacity: 0.8;
    }
    .maplibregl-ctrl-attrib {
      font-size: 9px !important;
      background: rgba(255, 255, 255, 0.7) !important;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 2px 8px !important;
      border-radius: 12px !important;
      margin: 0 0 8px 8px !important;
    }
    .maplibregl-ctrl-attrib a {
      color: #1f2a41 !important;
    }

    @media (max-width: 768px) {
      .legend-toggle-btn {
        display: none !important;
      }
      .mobile-glass-panel {
        display: flex !important;
      }
      .desktop-controls {
        display: none !important;
      }
      .city-select-menu {
        display: block !important;
      }
      .filter-select-menu {
        display: block !important;
      }
      .legend-popup {
        bottom: 190px;
        left: 50%;
        transform: translate(-50%, 0) scale(0.95);
        right: auto;
        top: auto;
        max-width: 90%;
        width: 280px;
        padding: 1rem 1.2rem 1.2rem;
        font-size: 0.85rem;
        border-radius: 16px;
      }
      .legend-popup.visible {
        transform: translate(-50%, 0) scale(1);
      }
      .legend-popup-title {
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
      }
      .legend-item {
        padding: 0.3rem 0;
        gap: 0.5rem;
      }
      .legend-dot {
        width: 16px;
        height: 16px;
      }
      .legend-label {
        font-size: 0.8rem;
      }
      .maplibregl-popup-content {
        padding: 0.6rem 0.8rem 0.5rem;
        max-width: 240px;
        border-radius: 12px;
      }
      .maplibregl-popup-content .popup-desc {
        font-size: 0.9rem;
      }
      .maplibregl-popup-content .popup-label {
        font-size: 0.8rem;
      }
      .maplibregl-popup-content .popup-datetime {
        font-size: 0.7rem;
      }
      .maplibregl-popup-content .popup-coords {
        font-size: 0.7rem;
      }
      .maplibregl-popup-close-button {
        font-size: 1rem;
        padding: 2px 4px;
      }
    }

    @media (min-width: 769px) {
      .mobile-glass-panel {
        display: none !important;
      }
      .city-select-menu {
        display: none !important;
      }
      .filter-select-menu {
        display: none !important;
      }
      .legend-toggle-btn {
        display: flex !important;
      }
      .desktop-controls {
        display: flex !important;
      }
      .legend-popup {
        position: absolute;
        bottom: 10px;
        right: 30px;
        left: auto;
        top: auto;
        transform: translateY(12px) scale(0.95);
        max-width: 280px;
        width: auto;
      }
      .legend-popup.visible {
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 480px) {
      .mobile-glass-panel {
        bottom: 90px;
        padding: 8px 12px;
        border-radius: 14px;
        gap: 5px;
        min-width: 280px;
        max-width: 96%;
      }
      .mobile-glass-panel .glass-btn {
        font-size: 22px;
        padding: 6px 10px;
        border-radius: 8px;
        min-height: 40px;
        min-width: 40px;
      }
      .mobile-glass-panel .glass-btn .icon-img,
      .mobile-glass-panel .glass-btn .icon-img-location {
        width: 22px;
        height: 22px;
      }
      .city-select-menu {
        bottom: 160px;
        min-width: 160px;
        padding: 10px 14px;
      }
      .filter-select-menu {
        bottom: 160px;
        min-width: 180px;
        padding: 10px 14px;
      }
      .city-select-menu .city-option {
        font-size: 0.85rem;
        padding: 0.4rem 0.6rem;
      }
      .filter-select-menu .filter-option {
        font-size: 0.85rem;
        padding: 0.4rem 0.6rem;
      }
      .legend-popup {
        bottom: 160px;
        width: 260px;
        padding: 0.9rem 1rem 1rem;
      }
    }

    @media (max-width: 360px) {
      .mobile-glass-panel {
        bottom: 80px;
        padding: 6px 10px;
        min-width: 220px;
        gap: 4px;
      }
      .mobile-glass-panel .glass-btn {
        font-size: 18px;
        padding: 5px 8px;
        min-height: 34px;
        min-width: 34px;
      }
      .mobile-glass-panel .glass-btn .icon-img,
      .mobile-glass-panel .glass-btn .icon-img-location {
        width: 18px;
        height: 18px;
      }
      .city-select-menu {
        bottom: 140px;
        min-width: 140px;
        padding: 8px 10px;
      }
      .filter-select-menu {
        bottom: 140px;
        min-width: 160px;
        padding: 8px 10px;
      }
      .city-select-menu .city-option {
        font-size: 0.8rem;
        padding: 0.3rem 0.5rem;
      }
      .filter-select-menu .filter-option {
        font-size: 0.8rem;
        padding: 0.3rem 0.5rem;
      }
      .legend-popup {
        bottom: 140px;
        width: 220px;
        padding: 0.7rem 0.9rem 0.9rem;
        font-size: 0.8rem;
      }
    }

    @media (max-width: 800px) and (orientation: landscape) {
      .mobile-glass-panel {
        bottom: 60px;
        padding: 6px 12px;
        min-width: 260px;
      }
      .mobile-glass-panel .glass-btn {
        font-size: 22px;
        padding: 5px 10px;
        min-height: 36px;
        min-width: 36px;
      }
      .mobile-glass-panel .glass-btn .icon-img,
      .mobile-glass-panel .glass-btn .icon-img-location {
        width: 22px;
        height: 22px;
      }
      .city-select-menu {
        bottom: 120px;
        min-width: 160px;
        padding: 8px 12px;
      }
      .filter-select-menu {
        bottom: 120px;
        min-width: 180px;
        padding: 8px 12px;
      }
      .city-select-menu .city-option {
        font-size: 0.85rem;
        padding: 0.3rem 0.6rem;
      }
      .filter-select-menu .filter-option {
        font-size: 0.85rem;
        padding: 0.3rem 0.6rem;
      }
      .legend-popup {
        bottom: 120px;
        width: 240px;
        padding: 0.7rem 1rem 0.9rem;
        max-height: 70vh;
        overflow-y: auto;
      }
    }

    @media (max-width: 400px) {
      .maplibregl-ctrl-zoom {
        transform: scale(0.8);
        transform-origin: bottom left;
      }
      .maplibregl-ctrl-attrib {
        font-size: 7px !important;
        padding: 1px 6px !important;
      }
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .mobile-glass-panel {
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
        margin-bottom: env(safe-area-inset-bottom);
        bottom: calc(100px + env(safe-area-inset-bottom));
      }
      .city-select-menu {
        bottom: calc(190px + env(safe-area-inset-bottom));
      }
      .filter-select-menu {
        bottom: calc(190px + env(safe-area-inset-bottom));
      }
      .legend-popup {
        bottom: calc(190px + env(safe-area-inset-bottom));
      }
      .legend-toggle-btn {
        bottom: calc(30px + env(safe-area-inset-bottom));
        right: calc(30px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
<div id="map-container">
  <div id="map"></div>

  <button class="legend-toggle-btn" id="legendToggleBtn">i</button>

  <div class="desktop-controls">
    <div class="city-buttons">
      <button class="city-btn" id="mskBtn">МСК</button>
      <button class="city-btn" id="spbBtn">СПБ</button>
    </div>
    <div class="desktop-filter-dropdown">
      <button class="filter-dropdown-btn" id="desktopFilterBtn">
        <span id="desktopFilterLabel">Все АЗС</span>
        <span class="arrow">▼</span>
      </button>
      <div class="filter-dropdown-menu" id="desktopFilterMenu">
        <div class="filter-option active-filter" data-filter="all">Все АЗС</div>
        <div class="filter-option" data-filter="type1">Газпромнефть</div>
        <div class="filter-option" data-filter="type2">Татнефть</div>
        <div class="filter-option" data-filter="other">Другие</div>
      </div>
    </div>
  </div>

  <div class="mobile-glass-panel" id="mobileGlassPanel">
    <button class="glass-btn" id="filterBtn">☰</button>
    <button class="glass-btn" id="cityBtn">
      <svg class="icon-img-location" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
    </button>
    <button class="glass-btn" id="legendBtn">i</button>
  </div>

  <div class="city-select-menu" id="citySelectMenu">
    <div class="city-select-menu-title">Выберите город</div>
    <div class="city-option" data-city="msk" data-lng="37.6173" data-lat="55.7558">Москва</div>
    <div class="city-option" data-city="spb" data-lng="30.3166" data-lat="59.9343">Санкт-Петербург</div>
  </div>

  <div class="filter-select-menu" id="filterSelectMenu">
    <div class="filter-select-menu-title">Выберите сеть АЗС</div>
    <div class="filter-option active-filter" data-filter="all">Все АЗС</div>
    <div class="filter-option" data-filter="type1">Газпромнефть</div>
    <div class="filter-option" data-filter="type2">Татнефть</div>
    <div class="filter-option" data-filter="other">Другие</div>
  </div>

  <div class="legend-popup" id="legendPopup">
    <div class="legend-popup-title">Доступность АЗС</div>
    <div id="legendItems">
      <div class="legend-item" data-color="#e74c3c">
        <span class="legend-dot" style="background: #e74c3c;"></span>
        <span class="legend-label">Отказ в заправке</span>
      </div>
      <div class="legend-item" data-color="#f1c40f">
        <span class="legend-dot" style="background: #f1c40f;"></span>
        <span class="legend-label">Ограничение по литрам</span>
      </div>
      <div class="legend-item" data-color="#3498db">
        <span class="legend-dot" style="background: #3498db;"></span>
        <span class="legend-label">Нет топлива</span>
      </div>
      <div class="legend-item" data-color="#00ff00">
        <span class="legend-dot" style="background: #00ff00;"></span>
        <span class="legend-label">Доступна к заправке</span>
      </div>
      <div class="legend-item" data-color="#169a7a">
        <span class="legend-dot" style="background: #169a7a;"></span>
        <span class="legend-label">Возможно появилось топливо</span>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/ProilKarpenko/Proil_AZS/refs/heads/main/data.csv';

    const map = new maplibregl.Map({
    	container: "map",
  	style: "https://tiles.openfreemap.org/styles/positron",
      	center: [37.6173, 55.7558],
      	zoom: 12,
      	attributionControl: true,
      	minZoom: 2,
      	maxZoom: 19,
    });

    let allFeatures = [];
    let hiddenColors = new Set();
    let locationAttempted = false;
    let currentFilter = 'all';

    const legendToggleBtn = document.getElementById('legendToggleBtn');
    const legendPopup = document.getElementById('legendPopup');
    const legendItems = document.querySelectorAll('.legend-item');
    const filterBtn = document.getElementById('filterBtn');
    const cityBtn = document.getElementById('cityBtn');
    const legendBtn = document.getElementById('legendBtn');
    const mskBtn = document.getElementById('mskBtn');
    const spbBtn = document.getElementById('spbBtn');
    const citySelectMenu = document.getElementById('citySelectMenu');
    const cityOptions = document.querySelectorAll('.city-option');
    const filterSelectMenu = document.getElementById('filterSelectMenu');
    const filterOptions = document.querySelectorAll('.filter-option');
    const desktopFilterBtn = document.getElementById('desktopFilterBtn');
    const desktopFilterMenu = document.getElementById('desktopFilterMenu');
    const desktopFilterLabel = document.getElementById('desktopFilterLabel');
    const desktopFilterOptions = document.querySelectorAll('.desktop-filter-dropdown .filter-option');

    const filterLabels = {
      'all': 'Все АЗС',
      'type1': 'Газпромнефть',
      'type2': 'Татнефть',
      'other': 'Другие'
    };

    function closeAllMobileMenus(except) {
      if (except !== 'city') {
        citySelectMenu.classList.remove('visible');
        cityBtn.classList.remove('active');
      }
      if (except !== 'filter') {
        filterSelectMenu.classList.remove('visible');
        filterBtn.classList.remove('active');
      }
      if (except !== 'legend') {
        legendPopup.classList.remove('visible');
        legendToggleBtn.classList.remove('active');
        legendBtn.classList.remove('active');
      }
    }

    function flyToCity(lng, lat, zoom) {
      map.flyTo({
        center: [lng, lat],
        zoom: zoom || 9,
        essential: true,
        duration: 1500
      });
    }

    mskBtn.addEventListener('click', function() {
      flyToCity(37.6173, 55.7558, 9);
    });

    spbBtn.addEventListener('click', function() {
      flyToCity(30.3166, 59.9343, 9);
    });

    desktopFilterBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      desktopFilterMenu.classList.toggle('open');
      desktopFilterBtn.classList.toggle('active');
    });

    desktopFilterOptions.forEach(option => {
      option.addEventListener('click', function(e) {
        e.stopPropagation();
        const filter = this.dataset.filter;
        desktopFilterOptions.forEach(opt => opt.classList.remove('active-filter'));
        this.classList.add('active-filter');
        desktopFilterLabel.textContent = filterLabels[filter] || 'Все объекты';
        currentFilter = filter;
        applyFilter();
        desktopFilterMenu.classList.remove('open');
        desktopFilterBtn.classList.remove('active');
      });
    });

    document.addEventListener('click', function(e) {
      if (desktopFilterMenu.classList.contains('open')) {
        if (!desktopFilterMenu.contains(e.target) && e.target !== desktopFilterBtn) {
          desktopFilterMenu.classList.remove('open');
          desktopFilterBtn.classList.remove('active');
        }
      }
    });

    cityBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const isVisible = citySelectMenu.classList.contains('visible');
      closeAllMobileMenus('city');
      if (!isVisible) {
        citySelectMenu.classList.add('visible');
        cityBtn.classList.add('active');
      }
    });

    cityOptions.forEach(option => {
      option.addEventListener('click', function(e) {
        e.stopPropagation();
        const lng = parseFloat(this.dataset.lng);
        const lat = parseFloat(this.dataset.lat);
        const zoom = this.dataset.city === 'msk' ? 11 : 10;
        flyToCity(lng, lat, zoom);
        closeAllMobileMenus();
      });
    });

    filterBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const isVisible = filterSelectMenu.classList.contains('visible');
      closeAllMobileMenus('filter');
      if (!isVisible) {
        filterSelectMenu.classList.add('visible');
        filterBtn.classList.add('active');
      }
    });

    filterOptions.forEach(option => {
      option.addEventListener('click', function(e) {
        e.stopPropagation();
        const filter = this.dataset.filter;
        filterOptions.forEach(opt => opt.classList.remove('active-filter'));
        this.classList.add('active-filter');
        currentFilter = filter;
        desktopFilterLabel.textContent = filterLabels[filter] || 'Все АЗС';
        desktopFilterOptions.forEach(opt => {
          opt.classList.toggle('active-filter', opt.dataset.filter === filter);
        });
        applyFilter();
        closeAllMobileMenus();
      });
    });

    legendBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const isVisible = legendPopup.classList.contains('visible');
      closeAllMobileMenus('legend');
      if (!isVisible) {
        legendPopup.classList.add('visible');
        legendBtn.classList.add('active');
        legendToggleBtn.classList.add('active');
      }
    });

    legendToggleBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const isVisible = legendPopup.classList.contains('visible');
      if (!isVisible) {
        legendPopup.classList.add('visible');
        legendToggleBtn.classList.add('active');
        legendBtn.classList.add('active');
      } else {
        legendPopup.classList.remove('visible');
        legendToggleBtn.classList.remove('active');
        legendBtn.classList.remove('active');
      }
    });

    document.addEventListener('click', function(e) {
      const isClickOnCity = citySelectMenu.contains(e.target) || cityBtn.contains(e.target);
      const isClickOnFilter = filterSelectMenu.contains(e.target) || filterBtn.contains(e.target);
      const isClickOnLegend = legendPopup.contains(e.target) || legendToggleBtn.contains(e.target) || legendBtn.contains(e.target);
      if (!isClickOnCity && !isClickOnFilter && !isClickOnLegend) {
        closeAllMobileMenus();
      }
    });

    function applyFilter() {
      if (!map.getSource('markers') || allFeatures.length === 0) return;
      let filteredFeatures = allFeatures;
      if (currentFilter === 'type1') {
        filteredFeatures = allFeatures.filter(f => {
          const label = f.properties.label.toLowerCase();
          return label === 'газпромнефть';
        });
      } else if (currentFilter === 'type2') {
        filteredFeatures = allFeatures.filter(f => {
          const label = f.properties.label.toLowerCase();
          return label === 'татнефть';
        });
      } else if (currentFilter === 'other') {
        filteredFeatures = allFeatures.filter(f => {
          const label = f.properties.label.toLowerCase();
          return label !== 'газпромнефть' && label !== 'татнефть';
        });
      }
      if (hiddenColors.size > 0) {
        filteredFeatures = filteredFeatures.filter(f => {
          const color = f.properties.color;
          return !hiddenColors.has(color);
        });
      }
      const filteredGeoJSON = {
        type: 'FeatureCollection',
        features: filteredFeatures
      };
      map.getSource('markers').setData(filteredGeoJSON);
    }

    legendItems.forEach(item => {
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        const color = this.dataset.color;
        if (hiddenColors.has(color)) {
          hiddenColors.delete(color);
          this.classList.remove('hidden');
        } else {
          hiddenColors.add(color);
          this.classList.add('hidden');
        }
        applyFilter();
      });
    });

    function locateUser() {
      if (locationAttempted) return;
      locationAttempted = true;
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        function(position) {
          const { latitude, longitude } = position.coords;
          map.flyTo({
            center: [longitude, latitude],
            zoom: 12,
            essential: true,
            duration: 2000
          });
          if (map.getSource('user-location')) {
            map.removeSource('user-location');
          }
          map.addSource('user-location', {
            type: 'geojson',
            data: {
              type: 'Feature',
              geometry: {
                type: 'Point',
                coordinates: [longitude, latitude]
              },
              properties: {}
            }
          });
          if (map.getLayer('user-location-layer')) {
            map.removeLayer('user-location-layer');
          }
          map.addLayer({
            id: 'user-location-layer',
            type: 'circle',
            source: 'user-location',
            paint: {
              'circle-radius': [
                'interpolate', ['linear'], ['zoom'],
                0, 6,
                10, 10,
                15, 14
              ],
              'circle-color': '#3b82f6',
              'circle-stroke-width': 3,
              'circle-stroke-color': '#ffffff',
              'circle-opacity': 0.9,
              'circle-blur': 0.1
            }
          });
          if (map.getLayer('user-location-pulse')) {
            map.removeLayer('user-location-pulse');
          }
          map.addLayer({
            id: 'user-location-pulse',
            type: 'circle',
            source: 'user-location',
            paint: {
              'circle-radius': [
                'interpolate', ['linear'], ['zoom'],
                0, 12,
                10, 20,
                15, 28
              ],
              'circle-color': '#3b82f6',
              'circle-opacity': 0.2,
              'circle-blur': 0.4
            }
          });
        },
        function(error) {},
        {
          enableHighAccuracy: true,
          timeout: 8000,
          maximumAge: 60000
        }
      );
    }

    function getColorHex(color) {
      if (!color) return '#3b82f6';
      const c = String(color).trim();
      if (/^#[0-9a-f]{6}$/i.test(c) || /^#[0-9a-f]{3}$/i.test(c)) return c;
      return '#3b82f6';
    }

    function clearMarkers() {
      const layers = map.getStyle().layers;
      if (layers) {
        const toRemove = [];
        layers.forEach(layer => {
          if (layer.id.startsWith('marker-circle-') || layer.id.startsWith('marker-symbol-')) {
            toRemove.push(layer.id);
          }
        });
        toRemove.forEach(id => {
          if (map.getLayer(id)) map.removeLayer(id);
        });
      }
      if (map.getSource('markers')) {
        map.removeSource('markers');
      }
    }

    function renderMarkers(data) {
      clearMarkers();
      if (!data || data.length === 0) {
        allFeatures = [];
        return;
      }
      const features = data.map((item, index) => {
        const color = getColorHex(item.color);
        return {
          type: 'Feature',
          geometry: {
            type: 'Point',
            coordinates: [item.lon, item.lat]
          },
          properties: {
            id: index,
            label: item.label || 'Маркер',
            description: item.desc || '',
            datetime: item.datetime || '',
            color: color,
            lon: item.lon,
            lat: item.lat,
          }
        };
      });
      allFeatures = features;
      const geojson = {
        type: 'FeatureCollection',
        features: features
      };
      map.addSource('markers', {
        type: 'geojson',
        data: geojson
      });
      map.addLayer({
        id: 'marker-circle-layer',
        type: 'circle',
        source: 'markers',
        paint: {
          'circle-radius': [
            'interpolate', ['linear'], ['zoom'],
            0, 3,
            4, 4,
            8, 6,
            12, 10,
            19, 10
          ],
          'circle-color': ['get', 'color'],
          'circle-stroke-width': 1.5,
          'circle-stroke-color': '#ffffff',
          'circle-opacity': 0.92,
        }
      });
      applyFilter();
      bindPopup();
    }

    function parseCSV(csvText) {
      const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
      if (lines.length === 0) return [];
      const headers = lines[0].split(';').map(h => h.trim().toLowerCase());
      const result = [];
      for (let i = 1; i < lines.length; i++) {
        const values = lines[i].split(';').map(v => v.trim());
        const row = {};
        headers.forEach((header, index) => {
          row[header] = values[index] || '';
        });
        result.push(row);
      }
      return result;
    }

    function loadMarkersFromCSV(csvText) {
      const dataArray = parseCSV(csvText);
      if (!dataArray || dataArray.length === 0) {
        renderMarkers([]);
        return;
      }
      const parsed = [];
      for (let row of dataArray) {
        const lon = parseFloat(row.longitude);
        const lat = parseFloat(row.latitude);
        if (isNaN(lon) || isNaN(lat)) continue;
        const label = row.label || 'Маркер';
        const desc = row.description || '';
        const datetime = row.datetime || '';
        const color = row['marker-color'] || '#3b82f6';
        parsed.push({
          lon, lat,
          label: String(label),
          desc: String(desc),
          datetime: String(datetime),
          color: getColorHex(color),
        });
      }
      renderMarkers(parsed);
    }

    const popup = new maplibregl.Popup({
      closeButton: true,
      closeOnClick: false,
      offset: [0, -8],
      className: 'custom-popup'
    });

    function onMarkerClick(e) {
      const feature = e.features[0];
      if (!feature) return;
      const props = feature.properties;
      const description = props.description || '';
      const label = props.label || '';
      const datetime = props.datetime || '';
      const lon = props.lon || 0;
      const lat = props.lat || 0;
      let html = '';
      if (description) html += `<div class="popup-desc">${description}</div>`;
      if (label) html += `<div class="popup-label">${label}</div>`;
      if (datetime) html += `<div class="popup-datetime">Последнее обновление: ${datetime}</div>`;
      html += `<div class="popup-coords" data-lon="${lon}" data-lat="${lat}">
        <span>${lat.toFixed(6)}, ${lon.toFixed(6)}</span>
      </div>`;
      if (!html) html = '<div class="popup-label">Маркер</div>';
      popup
        .setLngLat(feature.geometry.coordinates)
        .setHTML(html)
        .addTo(map);
      setTimeout(() => {
        const coordsEl = document.querySelector('.popup-coords');
        if (coordsEl) {
          coordsEl.addEventListener('click', function(e) {
            e.stopPropagation();
            const lon = this.dataset.lon;
            const lat = this.dataset.lat;
            const coordString = `${lat}, ${lon}`;
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(coordString).then(() => {
                this.classList.add('copied');
                setTimeout(() => {
                  this.classList.remove('copied');
                }, 2000);
              }).catch(() => {
                fallbackCopy(coordString, this);
              });
            } else {
              fallbackCopy(coordString, this);
            }
          });
        }
      }, 100);
    }

    function fallbackCopy(text, element) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        element.classList.add('copied');
        setTimeout(() => {
          element.classList.remove('copied');
        }, 2000);
      } catch (err) {
        console.error('Ошибка копирования:', err);
      }
      document.body.removeChild(textarea);
    }

    function bindPopup() {
      map.off('click', 'marker-circle-layer', onMarkerClick);
      map.on('click', 'marker-circle-layer', onMarkerClick);
      map.on('mouseenter', 'marker-circle-layer', () => {
        map.getCanvas().style.cursor = 'pointer';
      });
      map.on('mouseleave', 'marker-circle-layer', () => {
        map.getCanvas().style.cursor = '';
      });
    }

    map.on('click', function(e) {
      const features = map.queryRenderedFeatures(e.point, { layers: ['marker-circle-layer'] });
      if (!features.length) {
        popup.remove();
      }
    });

    async function loadFromGitHub(url) {
      if (!url || url.trim() === '') {
        console.warn('GitHub raw URL не указан');
        return;
      }
      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const csvText = await response.text();
        if (!csvText || csvText.trim() === '') {
          console.warn('CSV файл пуст');
          return;
        }
        loadMarkersFromCSV(csvText);
        console.log('CSV файл загружен из GitHub');
      } catch (err) {
        console.error('Ошибка загрузки из GitHub:', err);
      }
    }

    map.on('load', function() {
      if (GITHUB_RAW_URL && GITHUB_RAW_URL.trim() !== '') {
        loadFromGitHub(GITHUB_RAW_URL);
      }
      setTimeout(function() {
        locateUser();
      }, 800);
    });

    if (map.loaded()) {
      if (GITHUB_RAW_URL && GITHUB_RAW_URL.trim() !== '') {
        loadFromGitHub(GITHUB_RAW_URL);
      }
      setTimeout(function() {
        locateUser();
      }, 800);
    } else {
      map.on('load', function() {
        if (GITHUB_RAW_URL && GITHUB_RAW_URL.trim() !== '') {
          loadFromGitHub(GITHUB_RAW_URL);
        }
        setTimeout(function() {
          locateUser();
        }, 800);
      });
    }

  })();
</script>
</body>
</html>
